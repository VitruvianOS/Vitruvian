name: C/C++ CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:trixie

    steps:
    - uses: actions/checkout@v1
    - name: update
      run: apt update
    - name: deps
      run: |
        apt install -y \
          bison \
          build-essential \
          cmake \
          debootstrap \
          debhelper \
          dh-dkms \
          dkms \
          elfutils \
          flex \
          git \
          grub-efi-amd64-bin \
          grub-pc-bin \
          libdrm-dev \
          libelf-dev \
          libfl-dev \
          libfreetype6-dev \
          libgif-dev \
          libicns-dev \
          libicu-dev \
          libinput-dev \
          libjpeg-dev \
          libncurses-dev \
          libopenexr-dev \
          libpng-dev \
          libtiff-dev \
          libudev-dev \
          libwebp-dev \
          linux-headers-amd64 \
          mtools \
          ninja-build \
          squashfs-tools \
          sudo \
          xorriso \
          zlib1g-dev \
          --fix-missing
    - name: fix kernel headers path
      run: |
        HOST_KERNEL=$(uname -r)
        HEADER_DIR=$(ls -d /usr/src/linux-headers-* | head -n1)
        mkdir -p /lib/modules/$HOST_KERNEL
        ln -s $HEADER_DIR /lib/modules/$HOST_KERNEL/build
    - name: mkdir
      run: mkdir generated.x86
    - name: directory exception
      run: cd generated.x86 && git config --global --add safe.directory /__w/Vitruvian/Vitruvian
    - name: submodule update
      run: git submodule update --init --recursive
    - name: setup environment
      run: cd generated.x86 && export TERM=xterm-256color && ../build/scripts/setupenv.sh
    - name: list nexus directory
      run: ls -la /__w/Vitruvian/Vitruvian/src/system/kernel/nexus
    - name: configure generated.x86
      run: cd generated.x86 && ../configure
    - name: ninja build
      run: cd generated.x86 && ninja
    - name: generate deb 
      run: cd generated.x86 && cpack
    - name: pack build output
      run: tar --exclude='generated.x86/LIVE_BOOT/chroot/dev/*' -czf generated.x86.tar.gz generated.x86
    - name: upload build output
      uses: actions/upload-artifact@v4
      with:
        name: generated
        path: generated.x86.tar.gz

  iso:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v1
    - name: download build output
      uses: actions/download-artifact@v4
      with:
        name: generated
        path: .
    - name: unpack build output
      run: tar -xzf generated.x86.tar.gz
    - name: recreate fake dev nodes
      run: |
        mkdir -p generated.x86/LIVE_BOOT/chroot/dev
        touch generated.x86/LIVE_BOOT/chroot/dev/{null,zero,tty,console,urandom,random,full,ptmx}
    - name: deps for ISO
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xorriso \
          squashfs-tools \
          mtools \
          grub-pc-bin \
          grub-efi-amd64-bin
    - name: generate ISO
      run: cd generated.x86 && export TERM=xterm-256color && ../build/scripts/mkiso.sh
    - name: upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: vitruvian-iso
        path: generated.x86/*.iso
