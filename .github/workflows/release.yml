name: Attach Last-Built Images to Release

on:
  release:
    types: [published]

permissions:
  contents: write
  actions: read

jobs:
  attach:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download artifacts from last successful builds
        run: |
          set -euo pipefail
          mkdir -p artifacts

          fetch_latest() {
            local workflow="$1"
            local outdir="$2"
            mkdir -p "$outdir"
            local run_id
            run_id=$(gh run list --workflow "$workflow" --status success --limit 1 --json databaseId --jq '.[0].databaseId')
            if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
              echo "No successful run found for $workflow"
              return 0
            fi
            echo "Fetching artifacts from $workflow run $run_id"
            gh run download "$run_id" --dir "$outdir"
          }

          fetch_latest ccpp.yml       artifacts/amd64
          fetch_latest ccpp-arm64.yml artifacts/arm64

          echo "--- artifacts laid out ---"
          find artifacts -type f | sort

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/amd64/**/*
            artifacts/arm64/**/*
          fail_on_unmatched_files: false
