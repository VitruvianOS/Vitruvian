name: Build Vitruvian ISO

on: [push]

jobs:
  iso-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison build-essential cmake debootstrap debhelper \
            dh-dkms dkms elfutils flex git \
            grub-efi-amd64-bin grub-pc-bin \
            libdrm-dev libelf-dev libfl-dev libfreetype6-dev \
            libgif-dev libicns-dev libicu-dev libinput-dev \
            libjpeg-dev libncurses-dev libopenexr-dev libpng-dev \
            libtiff-dev libudev-dev libwebp-dev libseat-dev \
            libblkid-dev linux-headers-$(uname -r) \
            mtools ninja-build squashfs-tools sudo xorriso zlib1g-dev \
            fakeroot devscripts lintian wget

      - name: Configure git safe.directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Create build directory
        run: mkdir -p generated.x86

      - name: Setup environment (build chroot)
        run: cd generated.x86 && ../build/scripts/setupenv.sh --chroot-build --arch=amd64

      - name: Configure
        run: cd generated.x86 && ../configure --arch=amd64 --build-type=Workflow --chroot-build

      - name: Build ISO
        run: cd generated.x86 && ../bake build --image-type=iso

      - name: Generate ISO checksum
        run: |
          cd generated.x86/image_tree
          for iso in *.iso; do
            sha256sum "$iso" > "$iso.sha256"
          done

      - name: Upload Vitruvian ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-ISO
          path: |
            generated.x86/image_tree/*.iso
            generated.x86/image_tree/*.sha256

      - name: Build RAW image
        run: cd generated.x86 && ../bake build --image-type=raw

      - name: Generate RAW checksum
        run: |
          cd generated.x86/output
          for raw in *.raw; do
            [ -e "$raw" ] && sha256sum "$raw" > "$raw.sha256"
          done

      - name: Upload Vitruvian RAW
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-RAW
          path: |
            generated.x86/output/*.raw
            generated.x86/output/*.sha256

      - name: Generate DEB checksums
        run: |
          cd generated.x86
          for deb in *.deb; do
            sha256sum "$deb" > "$deb.sha256"
          done

      - name: Upload Vitruvian DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-DEB
          path: |
            generated.x86/*.deb
            generated.x86/*.sha256
