# TEMPORARILY DISABLED — manual dispatch only. Re-enable by restoring the push trigger. See new-build-commands.md / build refactor.
name: Increment rev tag and notify Telegram

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  increment-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pushed ref (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check if push is a PR branch
        id: pr_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH:   ${{ github.ref_name }}
        run: |
          count=$(gh pr list --head "$BRANCH" --state open --json number --jq '. | length' 2>/dev/null || echo 0)
          if [ "$count" -gt 0 ]; then
            echo "is_pr=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find latest rev tag
        id: find_latest
        run: |
          latest=$(git tag --list 'rev-*' --sort=-v:refname | head -n1 || true)
          if [ -z "$latest" ]; then
            echo "latest=" >> "$GITHUB_OUTPUT"
            echo "num="    >> "$GITHUB_OUTPUT"
          else
            echo "latest=$latest"     >> "$GITHUB_OUTPUT"
            echo "num=${latest#rev-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine next rev number
        id: next_rev
        run: |
          num="${{ steps.find_latest.outputs.num }}"
          if echo "$num" | grep -Eq '^[0-9]+$'; then
            next=$((num + 1))
          else
            next=1
          fi
          echo "tag=rev-${next}" >> "$GITHUB_OUTPUT"
          echo "number=${next}"  >> "$GITHUB_OUTPUT"

      - name: Create and push rev tag
        if: steps.pr_check.outputs.is_pr != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.next_rev.outputs.tag }}"
          git tag "$tag" "$GITHUB_SHA"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "refs/tags/${tag}"
          echo "Created tag: $tag"

      - name: Analyze commits and generate synthesis
        id: synthesis
        env:
          BEFORE:  ${{ github.event.before }}
          AFTER:   ${{ github.event.after }}
        run: |
          zero="0000000000000000000000000000000000000000"
          
          # Determine commit range
          if [ "$BEFORE" = "$zero" ] || [ -z "$BEFORE" ]; then
            log_range="-5"
            range_desc="last 5"
          else
            log_range="${BEFORE}..${AFTER}"
            range_desc="in this push"
          fi
          
          # Count commits
          commit_count=$(git --no-pager log $log_range --format="" 2>/dev/null | wc -l)
          
          # Get top contributors
          top_authors=$(git --no-pager log $log_range --format="%an" 2>/dev/null | sort | uniq -c | sort -rn | head -3 | awk '{print $2 " (" $1 ")"}' | paste -sd "," - | sed 's/,/, /g')
          
          # Get changed files count and stats
          if [ "$BEFORE" = "$zero" ] || [ -z "$BEFORE" ]; then
            file_stats=$(git --no-pager log -5 --numstat --format="" 2>/dev/null | awk '{add+=$1; removed+=$2; files[$3]++} END {printf "%d files changed, +%d lines, -%d lines", length(files), add, removed}')
          else
            file_stats=$(git --no-pager log "${BEFORE}..${AFTER}" --numstat --format="" 2>/dev/null | awk '{add+=$1; removed+=$2; files[$3]++} END {printf "%d files changed, +%d lines, -%d lines", length(files), add, removed}')
          fi
          
          # Categorize changes from commit messages
          if [ "$BEFORE" = "$zero" ] || [ -z "$BEFORE" ]; then
            messages=$(git --no-pager log -5 --format="%s" 2>/dev/null)
          else
            messages=$(git --no-pager log "${BEFORE}..${AFTER}" --format="%s" 2>/dev/null)
          fi
          
          # Count change types
          features=$(echo "$messages" | grep -ic "^feat\|add\|new" || echo 0)
          fixes=$(echo "$messages" | grep -ic "^fix\|bug\|issue" || echo 0)
          refactors=$(echo "$messages" | grep -ic "^refactor\|refact\|cleanup" || echo 0)
          docs=$(echo "$messages" | grep -ic "^docs\|doc\|readme" || echo 0)
          
          # Build change summary line
          changes_list=""
          [ "$features" -gt 0 ] && changes_list="${changes_list}Added $features feature(s), "
          [ "$fixes" -gt 0 ] && changes_list="${changes_list}Fixed $fixes bug(s), "
          [ "$refactors" -gt 0 ] && changes_list="${changes_list}Refactored $refactors area(s), "
          [ "$docs" -gt 0 ] && changes_list="${changes_list}Updated $docs doc(s), "
          
          # Remove trailing comma and space
          changes_list=$(echo "$changes_list" | sed 's/, $//')
          
          # If no categorized changes, show generic message
          if [ -z "$changes_list" ]; then
            changes_list="Made $commit_count commit(s) with various improvements"
          fi
          
          # Get most changed directories
          if [ "$BEFORE" = "$zero" ] || [ -z "$BEFORE" ]; then
            top_dirs=$(git --no-pager log -5 --name-only --format="" 2>/dev/null | grep -o '^[^/]*' | sort | uniq -c | sort -rn | head -3 | awk '{print $2}' | paste -sd "," - | sed 's/,/, /g')
          else
            top_dirs=$(git --no-pager log "${BEFORE}..${AFTER}" --name-only --format="" 2>/dev/null | grep -o '^[^/]*' | sort | uniq -c | sort -rn | head -3 | awk '{print $2}' | paste -sd "," - | sed 's/,/, /g')
          fi
          
          # Output results for use in message building
          {
            echo "commit_count=$commit_count"
            echo "range_desc=$range_desc"
            echo "changes_list=$changes_list"
            echo "file_stats=$file_stats"
            echo "top_authors=$top_authors"
            echo "top_dirs=$top_dirs"
          } >> "$GITHUB_OUTPUT"

      - name: Build Telegram message
        id: message
        env:
          IS_PR:         ${{ steps.pr_check.outputs.is_pr }}
          REV_TAG:       ${{ steps.next_rev.outputs.tag }}
          COMMIT_COUNT:  ${{ steps.synthesis.outputs.commit_count }}
          RANGE_DESC:    ${{ steps.synthesis.outputs.range_desc }}
          CHANGES_LIST:  ${{ steps.synthesis.outputs.changes_list }}
          FILE_STATS:    ${{ steps.synthesis.outputs.file_stats }}
          TOP_AUTHORS:   ${{ steps.synthesis.outputs.top_authors }}
          TOP_DIRS:      ${{ steps.synthesis.outputs.top_dirs }}
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          repo="${GITHUB_REPOSITORY}"

          esc() { printf '%s' "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }

          if [ "$IS_PR" = "true" ]; then
            rev_line="Rev: (PR branch — no tag created)"
          else
            rev_line="Rev: <b>$(esc "$REV_TAG")</b>"
          fi

          header="<b>$(esc "$repo") [$(esc "$branch")]</b>"
          
          # Build synthesis section
          commit_summary="<b>${COMMIT_COUNT}</b> commits ${RANGE_DESC}"
          changes_section="<b>Changes:</b> ${CHANGES_LIST}"
          stats_section="<b>Files:</b> ${FILE_STATS}"
          
          areas_section=""
          if [ -n "$TOP_DIRS" ]; then
            areas_section="<b>Main areas:</b> $(esc "$TOP_DIRS")"
          fi
          
          contributors_section=""
          if [ -n "$TOP_AUTHORS" ]; then
            contributors_section="<b>Top contributors:</b> $(esc "$TOP_AUTHORS")"
          fi

          full="${header}"$'\n'"${rev_line}"$'\n\n'"${commit_summary}"$'\n'"${changes_section}"$'\n'"${stats_section}"
          
          [ -n "$areas_section" ] && full="${full}"$'\n'"${areas_section}"
          [ -n "$contributors_section" ] && full="${full}"$'\n'"${contributors_section}"

          # Telegram HTML limit is 4096 chars — stay safely under it
          limit=3800
          if [ "${#full}" -gt "$limit" ]; then
            full="${full:0:$limit}"$'\n'"...(truncated)"
          fi

          {
            echo 'msg<<__DELIM__'
            printf '%s\n' "$full"
            echo '__DELIM__'
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG:                ${{ steps.message.outputs.msg }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID — skipping."
            exit 0
          fi
          curl -sS --fail -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MSG}"
