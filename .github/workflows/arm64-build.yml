name: Build Vitruvian ARM64 image

on: [push]

jobs:
  arm64-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison build-essential cmake debootstrap debhelper \
            dh-dkms dkms elfutils flex git \
            grub-efi-amd64-bin grub-pc-bin \
            libdrm-dev libelf-dev libfl-dev libfreetype6-dev \
            libgif-dev libicns-dev libicu-dev libinput-dev \
            libjpeg-dev libncurses-dev libopenexr-dev libpng-dev \
            libtiff-dev libudev-dev libwebp-dev libseat-dev \
            libblkid-dev linux-headers-$(uname -r) \
            mtools ninja-build squashfs-tools sudo xorriso zlib1g-dev \
            fakeroot devscripts lintian wget \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            qemu-user-static qemu-system-aarch64

      - name: Configure git safe.directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Create build directory
        run: mkdir -p generated.arm64

      - name: Setup environment (build chroot)
        run: cd generated.arm64 && ../build/scripts/setupenv.sh --chroot-build --arch=arm64

      - name: Configure
        run: cd generated.arm64 && ../configure --arch=arm64 --build-type=Workflow --chroot-build

      - name: Build
        run: cd generated.arm64 && ../bake build --image-type=raspberry

      - name: Generate image checksum
        run: |
          cd generated.arm64/image_tree
          for img in *.img *.iso; do
            [ -e "$img" ] && sha256sum "$img" > "$img.sha256" || true
          done

      - name: Upload Vitruvian ARM64 image
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-ARM64-ISO
          path: |
            generated.arm64/image_tree/*
            generated.arm64/image_tree/*.sha256

      - name: Generate DEB checksums
        run: |
          cd generated.arm64
          for deb in *.deb; do
            sha256sum "$deb" > "$deb.sha256"
          done

      - name: Upload Vitruvian ARM64 DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: Vitruvian-ARM64-DEB
          path: |
            generated.arm64/*.deb
            generated.arm64/*.sha256
